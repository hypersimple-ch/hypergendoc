name: hypergendoc

services:
  proxy:
    image: caddy:2.11.4-alpine
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /config
      - /data
    volumes:
      - ./deploy/dev/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [edge]

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      ["pnpm", "--filter", "@hypergendoc/web", "dev", "--hostname", "0.0.0.0"]
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      SERVER_INTERNAL_ORIGIN: http://server:4000
    # Next.js development writes generated type files; production images are read-only.
    read_only: false
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp
      - /workspace/apps/web/.next:uid=1000,gid=1000
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [edge]

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@hypergendoc/server", "dev"]
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      RENDERER_SOCKET: /run/hypergendoc/renderer.sock
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      object-store-init:
        condition: service_completed_successfully
    read_only: true
    cap_drop: [ALL]
    group_add: ["10001"]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    volumes:
      - renderer-socket:/run/hypergendoc
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:4000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [edge, data]

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@hypergendoc/db", "migrate"]
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    networks: [data]
    restart: "no"

  renderer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@hypergendoc/renderer", "dev"]
    environment:
      NODE_ENV: development
      RENDERER_SOCKET: /run/hypergendoc/renderer.sock
    network_mode: none
    read_only: true
    user: "1000:1000"
    cap_drop: [ALL]
    group_add: ["10001"]
    security_opt: [no-new-privileges:true]
    pids_limit: 64
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,uid=1000,gid=1000
    volumes:
      - renderer-socket:/run/hypergendoc

  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hypergendoc}
      POSTGRES_USER: ${POSTGRES_USER:-hypergendoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  object-data-init:
    image: busybox:1.37.0-musl
    entrypoint: [/bin/sh, -ec]
    command:
      - chown 0:0 /data && chmod 0700 /data && chown 10001:10001 /data
    network_mode: none
    user: "0:0"
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN]
    security_opt: [no-new-privileges:true]
    volumes:
      - object-data:/data
    restart: "no"

  object-store:
    image: hypergendoc-object-store:dev
    build:
      context: .
      dockerfile: deploy/prod/Dockerfile.object-store
      target: server
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-hypergendoc-dev}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    depends_on:
      object-data-init:
        condition: service_completed_successfully
    user: "10001:10001"
    volumes:
      - object-data:/data
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001
    healthcheck:
      test: [CMD, curl, -f, http://127.0.0.1:9000/minio/health/live]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  object-store-init:
    image: hypergendoc-object-store-client:dev
    build:
      context: .
      dockerfile: deploy/prod/Dockerfile.object-store
      target: client
    depends_on:
      object-store:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-hypergendoc-dev}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-hypergendoc-private}
    entrypoint: [/bin/sh, -ec]
    command:
      - |
        mc alias set local http://object-store:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set none "local/$$S3_BUCKET"
    restart: "no"
    networks: [data]

networks:
  edge:
    internal: false
  data:
    internal: true

volumes:
  postgres-data:
  object-data:
  renderer-socket:
