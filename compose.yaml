name: hypergendoc

services:
  proxy:
    image: caddy:2.11.4-alpine
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /config
      - /data
    volumes:
      - ./deploy/dev/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [edge]

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      ["pnpm", "--filter", "@hypergendoc/web", "dev", "--hostname", "0.0.0.0"]
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      SERVER_INTERNAL_ORIGIN: http://server:4000
    # Next.js development writes generated type files; production images are read-only.
    read_only: false
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp
      - /workspace/apps/web/.next:uid=1000,gid=1000
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [edge]

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@hypergendoc/server", "dev"]
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      RENDERER_SOCKET: /run/hypergendoc/renderer.sock
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      object-store:
        condition: service_healthy
      renderer-socket-init:
        condition: service_completed_successfully
      renderer:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    group_add: ["10001"]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    volumes:
      - renderer-socket:/run/hypergendoc
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:4000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [edge, data]

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@hypergendoc/db", "migrate"]
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    networks: [data]
    restart: "no"

  renderer-socket-init:
    image: busybox:1.37.0-musl
    entrypoint: [/bin/sh, -ec]
    command:
      - chown 0:0 /run/hypergendoc && chmod 2770 /run/hypergendoc && chown 10001:10001 /run/hypergendoc
    network_mode: none
    user: "0:0"
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN]
    security_opt: [no-new-privileges:true]
    volumes:
      - renderer-socket:/run/hypergendoc
    restart: "no"
    mem_limit: 32m
    cpus: 0.1

  renderer:
    build:
      context: .
      dockerfile: apps/renderer/Dockerfile
    environment:
      NODE_ENV: production
      RENDERER_SOCKET: /run/hypergendoc/renderer.sock
    network_mode: none
    read_only: true
    user: "10001:10001"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 64
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,uid=10001,gid=10001
    volumes:
      - renderer-socket:/run/hypergendoc
    depends_on:
      renderer-socket-init:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD-SHELL, "test -S /run/hypergendoc/renderer.sock"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hypergendoc}
      POSTGRES_USER: ${POSTGRES_USER:-hypergendoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  object-data-init:
    image: busybox:1.37.0-musl
    entrypoint: [/bin/sh, -ec]
    command:
      - |
        for dir in /var/lib/garage/meta /var/lib/garage/data; do
          chown 0:0 "$$dir"
          chmod 0700 "$$dir"
          chown 10001:10001 "$$dir"
        done
    network_mode: none
    user: "0:0"
    read_only: true
    cap_drop: [ALL]
    cap_add: [CHOWN]
    security_opt: [no-new-privileges:true]
    volumes:
      - object-metadata:/var/lib/garage/meta
      - object-data:/var/lib/garage/data
    restart: "no"

  object-store:
    image: docker.io/dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    command: [/garage, server, --single-node, --default-bucket]
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?set GARAGE_RPC_SECRET in .env}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY:-GK00000000000000000000000000000000}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      GARAGE_DEFAULT_BUCKET: ${S3_BUCKET:-hypergendoc-private}
    depends_on:
      object-data-init:
        condition: service_completed_successfully
    user: "10001:10001"
    volumes:
      - ./deploy/prod/garage.toml:/etc/garage.toml:ro
      - object-metadata:/var/lib/garage/meta
      - object-data:/var/lib/garage/data
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001
    healthcheck:
      test: [CMD, /garage, status]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  object-store-tools:
    image: amazon/aws-cli:2.35.24@sha256:f7e6c7fb03510fd1f4e27469458ca372a37c823a8c32860e0dd2f04a41787794
    profiles: [tools]
    environment:
      AWS_ENDPOINT_URL: http://object-store:3900
      AWS_DEFAULT_REGION: ${S3_REGION:-garage}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-GK00000000000000000000000000000000}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      AWS_PAGER: ""
    depends_on:
      object-store:
        condition: service_healthy
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /root/.aws:rw,noexec,nosuid,size=16m
      - /tmp:rw,noexec,nosuid,size=16m
    networks: [data]
    restart: "no"

networks:
  edge:
    internal: false
  data:
    internal: true

volumes:
  postgres-data:
  object-metadata:
  object-data:
  renderer-socket:
