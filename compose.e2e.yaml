# TEST-ONLY overlay. Invoke with: docker compose -f compose.yaml -f compose.e2e.yaml up --build
# It publishes test dependencies only on loopback; production/development compose remains unchanged.
services:
  server:
    ports:
      - "127.0.0.1:14000:4000"
  postgres:
    ports:
      - "127.0.0.1:15432:5432"
    networks: [data, e2e]
  object-store:
    ports:
      - "127.0.0.1:19000:9000"
    networks: [data, e2e]
  renderer:
    command: ["pnpm", "exec", "tsx", "scripts/test-fake-renderer.ts"]

networks:
  e2e:
    internal: false
